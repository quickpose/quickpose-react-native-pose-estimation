name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Pin npm — v11.12.1 (current @latest) ships broken with a missing
      # promise-retry dependency. v11 is required for OIDC trusted publishing.
      - run: npm install -g npm@11.11.1

      - run: npm install

      - run: npx tsc --noEmit

      - run: npm publish --access public --provenance
